name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: crm_db
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx psycopg2-binary
    
    - name: Set environment variables
      run: |
        echo "DB_HOST=localhost" >> $GITHUB_ENV
        echo "DB_PORT=5432" >> $GITHUB_ENV
        echo "DB_NAME=crm_db" >> $GITHUB_ENV
        echo "DB_USER=postgres" >> $GITHUB_ENV
        echo "DB_PASSWORD=postgres123" >> $GITHUB_ENV
        echo "GROQ_API_KEY=mock_key_for_testing" >> $GITHUB_ENV
        echo "MODEL_NAME=llama-3.3-70b-versatile" >> $GITHUB_ENV
        echo "BASE_URL=https://api.groq.com/openai/v1" >> $GITHUB_ENV
        echo "KAFKA_MOCK_MODE=true" >> $GITHUB_ENV
        echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
    
    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          pg_isready -h localhost -p 5432 -U postgres && break
          sleep 2
        done
    
    - name: Setup database schema
      run: |
        PGPASSWORD=postgres123 psql -h localhost -U postgres -d crm_db -f database/schema.sql || true
      
    - name: Run tests
      run: |
        python -m pytest tests/test_agent.py tests/test_api.py tests/test_channels.py tests/test_workers.py -v --tb=short
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
