name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: crm_db
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup database
      run: |
        PGPASSWORD=postgres123 psql -h localhost -U postgres -d crm_db -f database/schema.sql
      env:
        PGPASSWORD: postgres123

    - name: Run tests (no DB needed)
      run: |
        python -m pytest tests/test_agent.py tests/test_channels.py tests/test_workers.py -v --tb=short
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: crm_db
        DB_USER: postgres
        DB_PASSWORD: postgres123
        GROQ_API_KEY: mock_key_for_ci
        MODEL_NAME: llama-3.3-70b-versatile
        BASE_URL: https://api.groq.com/openai/v1
        REDIS_URL: redis://localhost:6379
        KAFKA_MOCK_MODE: "true"

    - name: Run DB tests
      run: |
        python -m pytest tests/test_database.py tests/test_api.py -v --tb=short
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: crm_db
        DB_USER: postgres
        DB_PASSWORD: postgres123
        GROQ_API_KEY: mock_key_for_ci
        MODEL_NAME: llama-3.3-70b-versatile
        BASE_URL: https://api.groq.com/openai/v1
        REDIS_URL: redis://localhost:6379
        KAFKA_MOCK_MODE: "true"
