version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm-postgres
    environment:
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - crm-postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  crm-postgres-data:
    name: crm-postgres-data
