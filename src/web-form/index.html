<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Digital FTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950">
    <div id="root"></div>

    <script type="text/babel" src="SupportForm.jsx"></script>
    <script type="text/babel" src="Dashboard.jsx"></script>

    <script type="text/babel">
      function App() {
        const [page, setPage] = React.useState(
          window.location.hash === '#dashboard' ? 'dashboard' : 'form'
        );

        React.useEffect(() => {
          const onHashChange = () => {
            setPage(window.location.hash === '#dashboard' ? 'dashboard' : 'form');
          };
          window.addEventListener('hashchange', onHashChange);
          return () => window.removeEventListener('hashchange', onHashChange);
        }, []);

        const navStyle = (active) =>
          'px-4 py-2 text-sm font-medium rounded-lg transition-colors ' +
          (active
            ? 'bg-blue-600 text-white shadow-sm'
            : 'text-gray-400 hover:text-gray-200 hover:bg-gray-800');

        return (
          <div className="min-h-screen">
            {/* Top nav */}
            <div className="border-b border-gray-800 bg-gray-900/80 backdrop-blur-sm">
              <div className="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
                <span className="text-sm font-bold bg-gradient-to-r from-blue-400 to-green-400 bg-clip-text text-transparent">
                  CRM Digital FTE
                </span>
                <nav className="flex gap-2">
                  <button className={navStyle(page === 'form')} onClick={() => { window.location.hash = 'form'; }}>
                    Support Form
                  </button>
                  <button className={navStyle(page === 'dashboard')} onClick={() => { window.location.hash = 'dashboard'; }}>
                    Dashboard
                  </button>
                </nav>
              </div>
            </div>

            {/* Page content */}
            <div className="max-w-7xl mx-auto px-6 py-8">
              {page === 'form' ? <SupportForm /> : <Dashboard />}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
