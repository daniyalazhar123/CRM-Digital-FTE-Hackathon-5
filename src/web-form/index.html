<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Digital FTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950">
    <div id="root"></div>

    <script type="text/babel" src="components/Navbar.jsx"></script>
    <script type="text/babel" src="pages/SupportForm.jsx"></script>
    <script type="text/babel" src="pages/Dashboard.jsx"></script>
    <script type="text/babel" src="pages/TicketStatus.jsx"></script>

    <script type="text/babel">
      function App() {
        const [page, setPage] = React.useState(
          window.location.hash === '#dashboard' ? 'dashboard'
            : window.location.hash === '#status' ? 'status'
            : 'form'
        );

        React.useEffect(() => {
          const onHashChange = () => {
            const hash = window.location.hash.replace('#', '') || 'form';
            setPage(hash);
          };
          window.addEventListener('hashchange', onHashChange);
          return () => window.removeEventListener('hashchange', onHashChange);
        }, []);

        const navigate = (hash) => {
          window.location.hash = hash;
        };

        return (
          <div className="min-h-screen">
            <Navbar currentPage={page} onNavigate={navigate} />

            <div className="max-w-7xl mx-auto px-6 py-8">
              {page === 'form' && <SupportForm />}
              {page === 'dashboard' && <Dashboard />}
              {page === 'status' && <TicketStatus />}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
